# Supabase configuration
#
# Remote project ID (from SUPABASE_URL in .env.local):
#   https://<project_id>.supabase.co
#
# Used by MCP Supabase tools (execute_sql, apply_migration, etc.)
# and `supabase link`. Read from .env.local to get the correct value.
project_id = "xzcdodccpjmveubfitvo"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
major_version = 15

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324
smtp_port = 54325
pop3_port = 54326

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["https://localhost:3000"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false
