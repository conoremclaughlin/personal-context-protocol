services:
  pcp-app:
    build:
      context: .
      dockerfile: Dockerfile.app
    image: personal-context-protocol:app
    container_name: pcp-app
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      INK_PORT_BASE: ${INK_PORT_BASE:-3001}
      WEB_PORT: ${WEB_PORT:-3002}
      MYRA_HTTP_PORT: ${MYRA_HTTP_PORT:-3003}
      API_URL: ${API_URL:-http://localhost:3001}
      SUPABASE_URL: ${SUPABASE_URL:?SUPABASE_URL is required}
      SUPABASE_PUBLISHABLE_KEY: ${SUPABASE_PUBLISHABLE_KEY:?SUPABASE_PUBLISHABLE_KEY is required}
      SUPABASE_SECRET_KEY: ${SUPABASE_SECRET_KEY:?SUPABASE_SECRET_KEY is required}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      ENABLE_TELEGRAM: ${ENABLE_TELEGRAM:-false}
      ENABLE_WHATSAPP: ${ENABLE_WHATSAPP:-false}
      ENABLE_DISCORD: ${ENABLE_DISCORD:-false}
      ENABLE_HEARTBEATS: ${ENABLE_HEARTBEATS:-true}
      ENABLE_REMINDERS: ${ENABLE_REMINDERS:-true}
      MCP_TRANSPORT: ${MCP_TRANSPORT:-http}
      MCP_REQUIRE_OAUTH: ${MCP_REQUIRE_OAUTH:-true}
      MCP_AUTH_TOKEN: ${MCP_AUTH_TOKEN:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      OAUTH_REDIRECT_BASE_URL: ${OAUTH_REDIRECT_BASE_URL:-http://localhost:3001}
    ports:
      - '${INK_PORT_BASE:-3001}:${INK_PORT_BASE:-3001}'
      - '${WEB_PORT:-3002}:${WEB_PORT:-3002}'
      - '${MYRA_HTTP_PORT:-3003}:${MYRA_HTTP_PORT:-3003}'
    healthcheck:
      test: ['CMD-SHELL', 'curl -fsS "http://localhost:${INK_PORT_BASE:-3001}/health" || exit 1']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    extra_hosts:
      - 'host.docker.internal:host-gateway'
